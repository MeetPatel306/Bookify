<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Sign Up - Bookify</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Create your Bookify account - Book hotels, restaurants and guest houses" name="description">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&family=Pacifico&display=swap" rel="stylesheet">

    <!-- Icon Font -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0F172B 0%, #1e2d50 50%, #0F172B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Heebo', sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(254,161,22,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 30% 70%, rgba(254,161,22,0.05) 0%, transparent 50%);
            animation: bgPulse 6s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(-5deg); }
        }

        .floating-circles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(254,161,22,0.12);
            animation: floatUp linear infinite;
        }

        .circle:nth-child(1) { width: 50px; height: 50px; left: 15%; animation-duration: 9s; }
        .circle:nth-child(2) { width: 90px; height: 90px; left: 30%; animation-duration: 13s; animation-delay: 3s; }
        .circle:nth-child(3) { width: 35px; height: 35px; left: 55%; animation-duration: 8s; animation-delay: 5s; }
        .circle:nth-child(4) { width: 70px; height: 70px; left: 75%; animation-duration: 10s; animation-delay: 2s; }
        .circle:nth-child(5) { width: 45px; height: 45px; left: 90%; animation-duration: 12s; animation-delay: 7s; }

        @keyframes floatUp {
            0% { bottom: -100px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { bottom: 110%; opacity: 0; }
        }

        .signup-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 44px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), 0 0 0 1px rgba(254,161,22,0.1);
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-logo a { text-decoration: none; }

        .brand-logo h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2.2rem;
            color: #FEA116;
            margin: 0;
            text-shadow: 0 0 30px rgba(254,161,22,0.4);
        }

        .brand-logo p {
            color: rgba(255,255,255,0.5);
            font-size: 0.82rem;
            margin-top: 5px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-title h2 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .page-title p {
            color: rgba(255,255,255,0.45);
            font-size: 0.86rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: rgba(255,255,255,0.65);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i.icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            transition: color 0.3s;
            pointer-events: none;
        }

        .input-wrap:focus-within i.icon-left { color: #FEA116; }

        .form-control-auth {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 14px 12px 42px;
            color: #fff;
            font-size: 0.88rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-control-auth::placeholder { color: rgba(255,255,255,0.22); }

        .form-control-auth:focus {
            border-color: #FEA116;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(254,161,22,0.15);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s;
            font-size: 13px;
        }

        .toggle-password:hover { color: #FEA116; }

        /* Password strength indicator */
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 6px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: all 0.4s ease;
            width: 0;
        }

        .strength-text {
            font-size: 0.75rem;
            margin-top: 4px;
            color: rgba(255,255,255,0.4);
        }

        .terms-check {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 22px;
        }

        .terms-check input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #FEA116;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .terms-check span {
            color: rgba(255,255,255,0.5);
            font-size: 0.83rem;
            line-height: 1.5;
        }

        .terms-check a {
            color: #FEA116;
            text-decoration: none;
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FEA116, #fb8500);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 0.93rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-signup::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-signup:hover::before { left: 100%; }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(254,161,22,0.4);
        }

        .login-link {
            text-align: center;
            color: rgba(255,255,255,0.45);
            font-size: 0.875rem;
            margin-top: 20px;
        }

        .login-link a {
            color: #FEA116;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover { opacity: 0.8; }

        .error-msg {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 18px;
            display: none;
        }

        .success-msg {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.3);
            color: #6ee7b7;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 18px;
            display: none;
        }

        @media (max-width: 480px) {
            .signup-card { padding: 32px 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div class="floating-circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="signup-container">
        <div class="signup-card">
            <!-- Brand -->
            <div class="brand-logo">
                <a href="index.html">
                    <h1>Bookify</h1>
                </a>
                <p>Your perfect stay, perfectly booked.</p>
            </div>

            <!-- Title -->
            <div class="page-title">
                <h2>Create Account</h2>
                <p>Join thousands of happy travellers today</p>
            </div>

            <!-- Messages -->
            <div class="error-msg" id="error-msg">
                <i class="fa fa-exclamation-circle me-2"></i>
                <span id="error-text">Something went wrong.</span>
            </div>
            <div class="success-msg" id="success-msg">
                <i class="fa fa-check-circle me-2"></i>
                Account created! Redirecting to login...
            </div>

            <!-- Signup Form -->
            <form id="signup-form" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <div class="input-wrap">
                            <input type="text" id="first-name" class="form-control-auth" placeholder="John" required>
                            <i class="fa fa-user icon-left"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last Name</label>
                        <div class="input-wrap">
                            <input type="text" id="last-name" class="form-control-auth" placeholder="Doe" required>
                            <i class="fa fa-user icon-left"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <div class="input-wrap">
                        <input type="email" id="signup-email" class="form-control-auth" placeholder="you@example.com" required>
                        <i class="fa fa-envelope icon-left"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="input-wrap">
                        <input type="tel" id="phone" class="form-control-auth" placeholder="+91 98765 43210">
                        <i class="fa fa-phone icon-left"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="signup-password" class="form-control-auth" placeholder="Create a strong password" required oninput="checkStrength(this.value)">
                        <i class="fa fa-lock icon-left"></i>
                        <button type="button" class="toggle-password" onclick="togglePassword('signup-password', this)" title="Show/Hide Password">
                            <i class="fa fa-eye"></i>
                        </button>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                    <div class="strength-text" id="strength-text"></div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrap">
                        <input type="password" id="confirm-password" class="form-control-auth" placeholder="Repeat your password" required>
                        <i class="fa fa-lock icon-left"></i>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm-password', this)" title="Show/Hide Password">
                            <i class="fa fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="terms-check">
                    <input type="checkbox" id="terms-agree" required>
                    <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                </div>

                <button type="submit" class="btn-signup" id="signup-btn">
                    <i class="fa fa-user-plus me-2"></i> Create Account
                </button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa fa-eye';
            }
        }

        function checkStrength(password) {
            const fill = document.getElementById('strength-fill');
            const text = document.getElementById('strength-text');
            let strength = 0;

            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            const levels = [
                { color: '#ef4444', label: 'Weak', width: '25%' },
                { color: '#f97316', label: 'Fair', width: '50%' },
                { color: '#eab308', label: 'Good', width: '75%' },
                { color: '#10b981', label: 'Strong', width: '100%' },
            ];

            if (password.length === 0) {
                fill.style.width = '0'; text.textContent = ''; return;
            }

            const level = levels[Math.min(strength - 1, 3)] || levels[0];
            fill.style.width = level.width;
            fill.style.background = level.color;
            text.textContent = level.label + ' password';
            text.style.color = level.color;
        }

        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;
            const termsAgreed = document.getElementById('terms-agree').checked;

            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            const successMsg = document.getElementById('success-msg');
            const btn = document.getElementById('signup-btn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!firstName || !lastName || !email || !password || !confirmPwd) {
                errorText.textContent = 'Please fill in all required fields.';
                errorMsg.style.display = 'block'; return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errorText.textContent = 'Please enter a valid email address.';
                errorMsg.style.display = 'block'; return;
            }

            if (password.length < 6) {
                errorText.textContent = 'Password must be at least 6 characters.';
                errorMsg.style.display = 'block'; return;
            }

            if (password !== confirmPwd) {
                errorText.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block'; return;
            }

            if (!termsAgreed) {
                errorText.textContent = 'Please agree to the Terms of Service.';
                errorMsg.style.display = 'block'; return;
            }

            // Check if email already exists
            const users = JSON.parse(localStorage.getItem('bookify_users') || '[]');
            if (users.find(u => u.email === email)) {
                errorText.textContent = 'An account with this email already exists.';
                errorMsg.style.display = 'block'; return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin me-2"></i> Creating Account...';

            setTimeout(() => {
                users.push({ name: firstName + ' ' + lastName, email, phone, password });
                localStorage.setItem('bookify_users', JSON.stringify(users));
                successMsg.style.display = 'block';
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            }, 1000);
        });

        // Redirect if already logged in
        const session = JSON.parse(localStorage.getItem('bookify_session') || sessionStorage.getItem('bookify_session') || 'null');
        if (session && session.loggedIn) {
            window.location.href = 'profile.html';
        }
    </script>
</body>

</html>
